<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programme TV</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --accent: #ff3c5f;
    --accent2: #ffb300;
    --accent3: #00d4ff;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --live: #ff3c5f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.4;
  }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.08em;
    color: var(--text);
    display: flex; align-items: center; gap: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.5; transform:scale(0.85); }
  }

  .current-time {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .current-time span { color: var(--accent2); font-weight: 500; }

  /* DAY SELECTOR */
  .day-bar {
    display: flex; gap: 6px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .day-bar::-webkit-scrollbar { height: 3px; }
  .day-bar::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }

  .day-btn {
    padding: 8px 18px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  .day-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

  .day-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 20px rgba(255,60,95,0.3);
  }



  /* MAIN GRID */
  .main { padding: 24px 0 24px 32px; }

  /* LAYOUT: sticky channel column + single shared scroll */
  .grid-layout {
    display: flex;
    overflow: hidden;
    gap: 0;
  }

  /* Sticky left column with channel labels */
  .channels-col {
    flex-shrink: 0;
    width: 120px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    position: sticky;
    left: 0;
    z-index: 10;
  }

  /* Single scrollable area for all program tracks */
  .tracks-scroll {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-behavior: smooth;
    cursor: grab;
  }

  .tracks-scroll:active { cursor: grabbing; }
  .tracks-scroll::-webkit-scrollbar { height: 5px; }
  .tracks-scroll::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }
  .tracks-scroll::-webkit-scrollbar-track { background: transparent; }

  .tracks-inner {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: max-content;
  }

  /* CHANNEL ROW */
  .channel-section {
    display: none; /* unused now */
  }

  @keyframes fadeIn {
    from { opacity:0; transform:translateY(8px); }
    to { opacity:1; transform:translateY(0); }
  }

  .channel-label {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 12px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 8px 0 0 8px;
    gap: 4px;
    min-height: 80px;
    animation: fadeIn 0.4s ease both;
  }

  .channel-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--muted);
    line-height: 1;
  }

  .channel-name {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text);
    text-align: center;
  }

  .channel-logo {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    color: #fff;
    letter-spacing: 0.05em;
  }

  /* PROGRAMS TRACK */
  .programs-track {
    display: flex;
    overflow-x: visible;
    border: 1px solid var(--border);
    border-left: none;
    border-radius: 0 8px 8px 0;
    background: var(--surface);
    animation: fadeIn 0.4s ease both;
  }

  .programs-track::-webkit-scrollbar { display: none; }

  /* PROGRAM CARD */
  .program {
    flex-shrink: 0;
    padding: 10px 14px;
    border-right: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
    min-width: 180px;
    display: flex; flex-direction: column; justify-content: space-between;
    min-height: 80px;
  }

  .program:last-child { border-right: none; }

  .program::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .program:hover { background: var(--surface2); }
  .program:hover::before { opacity: 1; }

  .program.live {
    background: rgba(255,60,95,0.07);
  }

  .program.live::before {
    background: var(--live);
    opacity: 1;
  }

  .program.past { opacity: 0.4; }

  .prog-time {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }

  .prog-title {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .prog-meta {
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap;
  }

  .prog-genre {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 600;
  }

  .live-badge {
    display: flex; align-items: center; gap: 4px;
    font-size: 0.62rem;
    font-weight: 700;
    color: var(--live);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .live-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--live);
    animation: pulse 1s ease-in-out infinite;
  }

  /* PROGRESS BAR */
  .prog-progress {
    position: absolute; bottom: 0; left: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 1s linear;
  }

  /* TIME RULER */
  .time-ruler {
    display: flex;
    margin-left: 120px;
    margin-bottom: 4px;
    overflow: hidden;
  }

  .time-tick {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    min-width: 120px;
    letter-spacing: 0.06em;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 200;
    align-items: center; justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 460px; width: 90%;
    animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }

  @keyframes modalIn {
    from { opacity:0; transform:scale(0.9) translateY(20px); }
    to { opacity:1; transform:scale(1) translateY(0); }
  }

  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: var(--surface2); border: none;
    color: var(--muted); width: 32px; height: 32px;
    border-radius: 50%; cursor: pointer;
    font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
    transition: color 0.2s;
  }

  .modal-close:hover { color: var(--text); }

  .modal-channel {
    font-size: 0.75rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-bottom: 8px;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; letter-spacing: 0.05em;
    color: var(--text); line-height: 1.1; margin-bottom: 12px;
  }

  .modal-time {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem; color: var(--accent2);
    margin-bottom: 16px; letter-spacing: 0.08em;
  }

  .modal-desc {
    font-size: 0.88rem; line-height: 1.7;
    color: rgba(240,240,245,0.7);
    margin-bottom: 20px;
  }

  .modal-tags { display: flex; gap: 8px; flex-wrap: wrap; }

  .modal-tag {
    padding: 5px 12px; border-radius: 6px;
    font-size: 0.72rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  /* SEARCH */
  .search-wrap {
    margin-left: auto; margin-right: 24px;
    position: relative;
  }

  .search-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    padding: 8px 14px 8px 34px;
    outline: none;
    width: 180px;
    transition: border-color 0.2s, width 0.3s;
  }

  .search-input:focus { border-color: rgba(255,255,255,0.2); width: 240px; }
  .search-input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 0.85rem; pointer-events: none;
  }

  /* EMPTY */
  .empty-state {
    padding: 60px; text-align: center; color: var(--muted);
    font-size: 0.9rem;
  }

  /* GENRE COLORS */
  .g-info { background: rgba(0,212,255,0.15); color: var(--accent3); }
  .g-film { background: rgba(255,179,0,0.15); color: var(--accent2); }
  .g-sport { background: rgba(0,230,120,0.15); color: #00e678; }
  .g-serie { background: rgba(180,100,255,0.15); color: #b464ff; }
  .g-divertissement { background: rgba(255,60,95,0.15); color: var(--accent); }
  .g-documentaire { background: rgba(255,140,60,0.15); color: #ff8c3c; }
  .g-musique { background: rgba(255,60,180,0.15); color: #ff3cb4; }

  .ce-soir-btn {
    background: linear-gradient(135deg, #1a1a30, #2a1a3a) !important;
    border-color: #a855f7 !important;
    color: #d8b4fe !important;
    font-weight: 600 !important;
    box-shadow: 0 0 14px rgba(168,85,247,0.25);
    transition: all 0.2s;
  }
  .ce-soir-btn:hover {
    background: linear-gradient(135deg, #2a1a3a, #3b1f5e) !important;
    box-shadow: 0 0 22px rgba(168,85,247,0.45);
    color: #f3e8ff !important;
  }


    header { padding: 14px 16px; }

    .day-bar, .filter-bar { padding: 12px 16px; }

    .channel-label { min-width: 80px; }
    .search-wrap { display: none; }
  }
</style>
</head>

// ─── STATE ──────────────────────────────────────────────────────────────────
let selectedDay = 0;
let searchQuery = '';

// ─── TIME UTILS ─────────────────────────────────────────────────────────────
function getMinutes() {
  const now = new Date();
  return now.getHours()*60 + now.getMinutes();
}

function fmt(hhmm) {
  const h = Math.floor(hhmm/100), m = hhmm%100;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function timeToMin(hhmm) {
  return Math.floor(hhmm/100)*60 + hhmm%100;
}

// ─── CLOCK ──────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockDisplay').innerHTML =
    `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} — <span>${hh}:${mm}:${ss}</span>`;
}
setInterval(updateClock, 1000);
updateClock();

// ─── DAYS BAR ───────────────────────────────────────────────────────────────
function buildDays() {
  const bar = document.getElementById('dayBar');
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  const today = new Date();
  // Remove previously generated day buttons (not the Ce soir btn)
  bar.querySelectorAll('.day-btn:not(.ce-soir-btn)').forEach(b => b.remove());
  for (let i=-1; i<=5; i++) {
    const d = new Date(today); d.setDate(today.getDate()+i);
    const label = i===0 ? 'Aujourd\'hui' : i===-1 ? 'Hier' : i===1 ? 'Demain' :
      `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (i===0 ? ' active' : '');
    btn.dataset.day = i;
    btn.textContent = label;
    bar.appendChild(btn);
  }
  bar.querySelectorAll('.day-btn:not(.ce-soir-btn)').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      selectedDay = parseInt(btn.dataset.day);
      bar.querySelectorAll('.day-btn:not(.ce-soir-btn)').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      render();
      scrollToSoir(false);
    });
  });
}



// ─── SEARCH ─────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e=>{
  searchQuery = e.target.value.toLowerCase();
  render();
});

// ─── CE SOIR ────────────────────────────────────────────────────────────────
function scrollToSoir(switchDay = true) {
  if (switchDay && selectedDay !== 0) {
    selectedDay = 0;
    document.querySelectorAll('.day-btn:not(.ce-soir-btn)').forEach(b => b.classList.remove('active'));
    const todayBtn = document.querySelector('.day-btn[data-day="0"]');
    if (todayBtn) todayBtn.classList.add('active');
    render();
  }
  setTimeout(() => {
    const scroll = document.getElementById('tracksScroll');
    const track = document.querySelector('.programs-track');
    if (!scroll || !track) return;
    const progs = track.querySelectorAll('.program');
    let target = null;
    progs.forEach(p => { if (!target && p.dataset.start >= '21:00') target = p; });
    if (!target) target = progs[progs.length - 1];
    if (target) scroll.scrollTo({ left: target.offsetLeft, behavior: 'smooth' });
  }, 150);
}


function render() {
  const now = getMinutes();
  const isToday = selectedDay === 0;

  const channelsCol = document.getElementById('channelsCol');
  const tracksInner = document.getElementById('tracksInner');
  const tracksScroll = document.getElementById('tracksScroll');

  let labelsHtml = '';
  let tracksHtml = '';
  let anyVisible = false;

  channels.forEach((ch, ci) => {
    const progs = programTemplates[ci];

    const filtered = progs.filter(p => {
      const [start, title, genre,,] = p;
      if (searchQuery && !title.toLowerCase().includes(searchQuery)) return false;
      return true;
    });

    if (filtered.length === 0) return;
    anyVisible = true;

    labelsHtml += `<div class="channel-label" style="animation-delay:${ci*0.04}s">
      <div class="channel-logo" style="background:${ch.color}">${ch.num}</div>
      <div class="channel-name">${ch.name}</div>
    </div>`;

    tracksHtml += `<div class="programs-track" id="track-${ci}" style="animation-delay:${ci*0.04}s">`;

    filtered.forEach(p => {
      const [start, title, genre, desc, dur] = p;
      const startMin = timeToMin(start);
      const endMin = startMin + dur;
      const end = Math.floor(endMin/60)*100 + (endMin%60);
      const gi = genreInfo(genre);
      const isLive = isToday && now >= startMin && now < endMin;
      const isPast = isToday && now >= endMin;
      const progress = isLive ? Math.round((now-startMin)/(endMin-startMin)*100) : 0;
      const widthPx = Math.max(140, dur * 2.8);

      tracksHtml += `<div class="program${isLive?' live':''}${isPast?' past':''}"
        style="min-width:${widthPx}px"
        data-title="${title}" data-channel="${ch.name}" data-start="${fmt(start)}" data-end="${fmt(end)}"
        data-desc="${desc}" data-genre="${genre}" data-gi-cls="${gi.cls}" data-gi-label="${gi.label}"
        onclick="openModal(this)">
        <div>
          <div class="prog-time">${fmt(start)} – ${fmt(end)}</div>
          <div class="prog-title">${title}</div>
        </div>
        <div class="prog-meta">
          ${isLive ? '<div class="live-badge"><div class="live-dot"></div>En direct</div>' : ''}
          <span class="prog-genre ${gi.cls}">${gi.label}</span>
        </div>
        ${isLive ? `<div class="prog-progress" style="width:${progress}%"></div>` : ''}
      </div>`;
    });

    tracksHtml += `</div>`;
  });

  if (!anyVisible) {
    channelsCol.innerHTML = '';
    tracksInner.innerHTML = '<div class="empty-state">Aucun programme trouvé pour cette sélection.</div>';
    return;
  }

  channelsCol.innerHTML = labelsHtml;
  tracksInner.innerHTML = tracksHtml;

  // Auto-scroll to live program on today
  if (isToday) {
    const firstTrack = tracksInner.querySelector('.programs-track');
    if (firstTrack) {
      const live = firstTrack.querySelector('.program.live');
      if (live) {
        setTimeout(() => {
          tracksScroll.scrollTo({ left: live.offsetLeft - 20, behavior: 'smooth' });
        }, 100);
      }
    }
  }

  // Mouse drag to scroll
  let isDown = false, startX, scrollLeft;
  tracksScroll.onmousedown = e => {
    isDown = true;
    startX = e.pageX - tracksScroll.offsetLeft;
    scrollLeft = tracksScroll.scrollLeft;
  };
  tracksScroll.onmouseleave = () => isDown = false;
  tracksScroll.onmouseup = () => isDown = false;
  tracksScroll.onmousemove = e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - tracksScroll.offsetLeft;
    tracksScroll.scrollLeft = scrollLeft - (x - startX);
  };
}


// ─── MODAL ──────────────────────────────────────────────────────────────────
function openModal(el) {
  document.getElementById('mChannel').textContent = el.dataset.channel;
  document.getElementById('mTitle').textContent = el.dataset.title;
  document.getElementById('mTime').textContent = `${el.dataset.start} – ${el.dataset.end}`;
  document.getElementById('mDesc').textContent = el.dataset.desc;
  const gi = { cls: el.dataset.giCls, label: el.dataset.giLabel };
  document.getElementById('mTags').innerHTML =
    `<span class="modal-tag ${gi.cls}">${gi.label}</span>
     <span class="modal-tag" style="background:rgba(255,255,255,0.07);color:var(--muted)">${el.dataset.channel}</span>`;
  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', ()=>{
  document.getElementById('modalOverlay').classList.remove('open');
});
document.getElementById('modalOverlay').addEventListener('click', e=>{
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
});

document.addEventListener('keydown', e=>{
  if (e.key==='Escape') document.getElementById('modalOverlay').classList.remove('open');
});

// ─── INIT ───────────────────────────────────────────────────────────────────
buildDays();
render();
</script>
