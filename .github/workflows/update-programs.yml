name: Update TV Programs

on:
  schedule:
    # Run daily at 4:00 AM UTC (5:00 AM Paris time)
    - cron: '0 4 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch and generate programs.json
        run: python scripts/update_programs.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add programs.json
          git diff --cached --quiet || git commit -m "Update TV programs $(date -u +%Y-%m-%d)"
          git push
